name: Build iOS Core (bring-up)

# The REAL iOS build loop. This actually cross-compiles the Cemu C++ engine for
# arm64-ios and FAILS LOUDLY with real diagnostics (no "|| true" masking like the
# old build-ipa.yml, which only compiled the Swift shell and hid every error).
#
# Expect this to fail on early runs — that is the point. Each failure is a real
# compiler/linker error to fix on the road to booting a title (see ROADMAP.md M1).
# Full logs are uploaded as an artifact every run. vcpkg deps are cached across
# runs via the GitHub Actions cache so only the first run pays the full dep cost.

on:
  workflow_dispatch: {}
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'cmake/**'
      - 'CMakeLists*.txt'
      - 'vcpkg.json'
      - '.github/workflows/build-ios-core.yml'

env:
  # vcpkg binary caching through the GitHub Actions cache — makes the grind fast.
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  build-core:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Select full Xcode (has the iOS SDK)
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-path

      # Expose the Actions cache endpoint/token so vcpkg's x-gha backend can use it.
      - name: Enable vcpkg GHA binary cache
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Set up vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git "$HOME/vcpkg"
          "$HOME/vcpkg/bootstrap-vcpkg.sh"
          echo "VCPKG_ROOT=$HOME/vcpkg" >> "$GITHUB_ENV"

      - name: Cross-compile dependencies for arm64-ios
        # First run is slow (boost/openssl/etc. for iOS); subsequent runs hit the cache.
        run: |
          "$HOME/vcpkg/vcpkg" install --triplet arm64-ios \
            --x-manifest-root="$GITHUB_WORKSPACE"

      - name: Configure Cemu core for iOS
        # Use the REAL top-level CMakeLists.txt (it has the true iOS logic: routes the
        # GUI to src/gui/iosgui, disables wx/OpenGL/Vulkan, enables Metal). vcpkg.cmake
        # is the primary toolchain and chainloads our iOS toolchain (SYSTEM_NAME iOS +
        # iPhoneOS sysroot). The old CMakeLists_iOS.txt was a naive stub — not used.
        run: |
          cmake -B build-ios -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$HOME/vcpkg/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_CHAINLOAD_TOOLCHAIN_FILE="$GITHUB_WORKSPACE/cmake/ios.toolchain.cmake" \
            -DVCPKG_TARGET_TRIPLET=arm64-ios \
            -DCMAKE_BUILD_TYPE=Release 2>&1 | tee configure.log

      - name: Build Cemu core (CemuCafe = the engine)
        # Build the engine library specifically, not the desktop app target. If this
        # compiles for arm64-ios, M1's exit test is met.
        run: cmake --build build-ios --target CemuCafe 2>&1 | tee build.log

      - name: Upload build logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-core-build-logs
          path: |
            configure.log
            build.log
            build-ios/**/*.log
          if-no-files-found: warn
          retention-days: 30
