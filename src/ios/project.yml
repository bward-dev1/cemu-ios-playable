name: Cemu-iOS

options:
  bundleIdPrefix: com.cemu
  deploymentTarget:
    iOS: '15.0'
  xcodeVersion: '15.0'

settings:
  PRODUCT_NAME: Cemu
  SDKROOT: iphoneos
  IPHONEOS_DEPLOYMENT_TARGET: '15.0'
  CODE_SIGN_IDENTITY: iPhone Developer
  CLANG_CXX_LANGUAGE_DIALECT: c++2a
  GCC_C_LANGUAGE_DIALECT: c99
  # Swift <-> C++ engine bridge (src/ios/Bridge/CemuBridge.{h,mm})
  SWIFT_OBJC_BRIDGING_HEADER: Bridge/Cemu-Bridging-Header.h
  CLANG_ENABLE_MODULES: 'YES'
  # Define CEMU_CORE_AVAILABLE once the real Cemu core links for arm64 (ROADMAP.md M1).
  # Until then the bridge honestly reports "core not built" and the app shell still builds.
  # GCC_PREPROCESSOR_DEFINITIONS: 'CEMU_CORE_AVAILABLE=1'

targets:
  Cemu:
    type: application
    platform: iOS
    deploymentTarget: '15.0'

    sources:
      - path: ../gui/iosgui
        includes:
          - '**/*.cpp'
          - '**/*.h'
      - path: ../Cafe
        includes:
          - '**/*.cpp'
          - '**/*.h'
      - path: ../Cemu
        includes:
          - '**/*.cpp'
          - '**/*.h'
      - path: ../config
        includes:
          - '**/*.cpp'
          - '**/*.h'
      - path: ../Common
        includes:
          - '**/*.cpp'
          - '**/*.h'
      - path: ../input
        includes:
          - '**/*.cpp'
          - '**/*.h'
      - path: ../audio
        includes:
          - '**/*.cpp'
          - '**/*.h'
      - path: ../util
        includes:
          - '**/*.cpp'
          - '**/*.h'
      - path: ../gui/interface
        includes:
          - '**/*.h'
      - path: ../imgui
        includes:
          - '**/*.cpp'
          - '**/*.h'
      - path: App
        type: group
      - path: Emulation
        type: group
      - path: Rendering
        type: group
      - path: Bridge
        type: group

    preBuildScripts:
      - name: Generate Version
        script: |
          echo "Generating version info..."

    scheme:
      gatherCoverageData: false
